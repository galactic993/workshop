name: Deploy to Development

on:
  push:
    branches:
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: oa_dev_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Frontend Tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

      # Backend Tests
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, redis
          coverage: none

      - name: Copy backend .env
        working-directory: backend
        run: cp .env.example .env

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generate application key
        working-directory: backend
        run: php artisan key:generate

      - name: Run database migrations
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: oa_dev_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan migrate --force

      - name: Run backend tests
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: oa_dev_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: php artisan test

      - name: Run backend lint (Pint)
        working-directory: backend
        run: ./vendor/bin/pint --test

  deploy:
    name: Deploy to Sakura VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Scanning host: ${{ secrets.VPS_HOST }} on port: ${{ secrets.VPS_SSH_PORT }}"
          ssh-keyscan -v -H -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>&1 || {
            echo "ssh-keyscan failed, trying without port..."
            ssh-keyscan -v -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>&1 || true
          }

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "📥 Pulling latest code..."
            git fetch origin
            git checkout develop
            echo "🔄 Resetting local changes..."
            # package-lock.json等の競合ファイルをリセット（storage配下は除外）
            git checkout -- frontend/package-lock.json 2>/dev/null || true
            git checkout -- . 2>/dev/null || true
            # マージできない場合はstashしてからプル
            git stash --include-untracked 2>/dev/null || true
            git pull origin develop
            echo "✅ Code updated to: $(git rev-parse --short HEAD)"
          ENDSSH

      - name: Setup environment files
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "📝 Checking environment files..."
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              echo "⚠️ Created backend/.env from example - please configure manually"
            else
              echo "✅ backend/.env exists"
            fi
            if [ ! -f frontend/.env.local ]; then
              cp frontend/.env.local.example frontend/.env.local 2>/dev/null || true
              echo "ℹ️ frontend/.env.local checked"
            else
              echo "✅ frontend/.env.local exists"
            fi
          ENDSSH

      - name: Build and start containers
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "🐳 Building containers..."
            docker compose build
            echo "🚀 Starting containers..."
            docker compose up -d
            echo "✅ Containers started"
          ENDSSH

      - name: Wait for containers to be healthy
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "⏳ Waiting for containers to be healthy..."

            # Wait for postgres
            for i in {1..30}; do
              if docker compose exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
                echo "✅ PostgreSQL is ready"
                break
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 2
            done

            # Wait for redis
            for i in {1..30}; do
              if docker compose exec -T redis redis-cli ping > /dev/null 2>&1; then
                echo "✅ Redis is ready"
                break
              fi
              echo "Waiting for Redis... ($i/30)"
              sleep 2
            done

            # Wait for backend
            for i in {1..30}; do
              if docker compose exec -T backend php -v > /dev/null 2>&1; then
                echo "✅ Backend container is ready"
                break
              fi
              echo "Waiting for Backend... ($i/30)"
              sleep 2
            done
          ENDSSH

      - name: Install backend dependencies
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "📦 Installing backend dependencies..."
            docker compose exec -T backend composer install --no-interaction --prefer-dist --optimize-autoloader
            echo "✅ Backend dependencies installed"
          ENDSSH

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "🗄️ Running database migrations..."
            echo "=========================================="
            docker compose exec -T backend php artisan migrate --force
            echo "=========================================="
            echo "✅ Migrations completed"

            echo ""
            echo "📋 Migration status:"
            docker compose exec -T backend php artisan migrate:status
          ENDSSH

      - name: Install frontend dependencies
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "📦 Installing frontend dependencies..."
            docker compose exec -T frontend npm install
            echo "✅ Frontend dependencies installed"
          ENDSSH

      - name: Clear application cache
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "🧹 Clearing application cache..."
            docker compose exec -T backend php artisan cache:clear
            docker compose exec -T backend php artisan config:clear
            docker compose exec -T backend php artisan route:clear
            docker compose exec -T backend php artisan view:clear
            echo "✅ Cache cleared"
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            echo "🔍 Verifying deployment..."
            echo ""
            echo "📦 Container status:"
            docker compose ps
            echo ""
            echo "🔧 Laravel environment:"
            docker compose exec -T backend php artisan env
            echo ""
            echo "📋 Route list (API):"
            docker compose exec -T backend php artisan route:list --path=api --columns=method,uri,name | head -30
          ENDSSH

      - name: Health check
        run: |
          echo "⏳ Waiting for application to be ready..."
          sleep 5
          echo "✅ Health check completed"

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "╔════════════════════════════════════════╗"
            echo "║  ✅ Deployment succeeded!              ║"
            echo "╚════════════════════════════════════════╝"
          else
            echo "╔════════════════════════════════════════╗"
            echo "║  ❌ Deployment failed!                 ║"
            echo "╚════════════════════════════════════════╝"
          fi

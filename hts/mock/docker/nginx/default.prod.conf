# VPS開発環境用 Nginx設定（Basic認証あり）
# ローカル開発では default.conf を使用

server {
    listen 80;
    server_name localhost;

    charset utf-8;

    # API and Sanctum requests -> Laravel backend (Basic認証をスキップ)
    location /api/ {
        auth_basic off;
        proxy_pass http://backend_laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sanctum/ {
        auth_basic off;
        proxy_pass http://backend_laravel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # pgAdmin4 -> PostgreSQL管理ツール (Basic認証を適用)
    location /pgadmin/ {
        auth_basic "Development Environment";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://pgadmin:80/;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # All other requests -> Next.js frontend (Basic認証を適用)
    location / {
        auth_basic "Development Environment";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Laravel backend (PHP-FPM via Nginx)
upstream backend_laravel {
    server 127.0.0.1:8080;
}

# Internal server for Laravel
server {
    listen 8080;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

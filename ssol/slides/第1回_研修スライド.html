<header>SSOL AI駆動開発研修 第1回</header>
<h2 id="ai--llm%E3%81%AE%E6%99%82%E4%BB%A3">AI = LLMの時代</h2>
<p>現在の「AI」と呼ばれるものの多くは <strong>LLM（大規模言語モデル）</strong> です</p>
<ul>
<li>大量のテキストデータから言語パターンを学習</li>
<li>文章生成、翻訳、要約、<strong>コード生成</strong>が可能</li>
<li>人間の指示（プロンプト）に基づいて動作</li>
</ul>
<div class="accent">
<p>AIは「何でもできる魔法」ではなく、<strong>指示の質で出力が決まる</strong>ツール</p>
</div>

<header>SSOL AI駆動開発研修 第1回</header>
<h2 id="ai%E3%81%AE%E8%AA%B2%E9%A1%8C%E2%91%A0-%E3%83%8F%E3%83%AB%E3%82%B7%E3%83%8D%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3">AIの課題①: ハルシネーション</h2>
<div class="warning">
<p><strong>ハルシネーション</strong>: AIが「もっともらしい嘘」をつくことがある</p>
</div>
<p><strong>例:</strong></p>
<ul>
<li>存在しないライブラリ名を提案する</li>
<li>架空のAPI仕様を説明する</li>
<li>間違ったコードを「正しい」と言い張る</li>
</ul>
<p><strong>防止のコツ:</strong></p>
<ul>
<li>事実確認が必要な内容は「出典を示して」と依頼する</li>
<li>重要な判断は「根拠・前提・不確実な点を分けて答えて」と指定する</li>
<li>生成結果をそのまま使わず、公式ドキュメント・実機・人間レビューで検証する</li>
<li>一発で完成させようとせず、レビュー→修正の往復を前提にする</li>
</ul>
<p><strong>大手企業への提案時には特に注意</strong> — 誤った情報を提示すると信頼を失う</p>
<footer>© 2026 KZP</footer>
</section>

<header>SSOL AI駆動開発研修 第1回</header>
<h2 id="ai%E3%81%AE%E8%AA%B2%E9%A1%8C%E2%91%A1-%E3%82%BB%E3%82%AD%E3%83%A5%E3%83%AA%E3%83%86%E3%82%A3">AIの課題②: セキュリティ</h2>
<div class="warning">
<p><strong>無料プランは業務利用で使わない</strong></p>
<p>入力内容を気をつけても、やり取り全体から機密情報が混ざるリスクは残ります。<br />
顧客案件・社内情報・認証情報を扱う場面では、<strong>無料プランは避ける</strong>ことを前提にします。</p>
</div>
<h3 id="%E3%83%97%E3%83%A9%E3%83%B3%E3%81%94%E3%81%A8%E3%81%AE%E8%80%83%E3%81%88%E6%96%B9">プランごとの考え方</h3>
<table>
<thead>
<tr>
<th>プラン</th>
<th>学習利用</th>
<th>備考</th>
</tr>
</thead>
<tbody>
<tr>
<td>無料</td>
<td><strong>利用しない</strong></td>
<td>業務データ・顧客情報は入力しない</td>
</tr>
<tr>
<td>有料（API / Team / Enterprise）</td>
<td><strong>原則されない</strong></td>
<td>商用利用では学習利用を禁止する契約が基本</td>
</tr>
<tr>
<td>有料（API / Team / Enterprise）</td>
<td>30日程度の保持はあり得る</td>
<td>不正利用検知・障害調査などのために一時保持される場合がある</td>
</tr>
</tbody>
</table>
<h3 id="%E3%82%BB%E3%82%AD%E3%83%A5%E3%83%AA%E3%83%86%E3%82%A3%E3%81%AE%E9%89%84%E5%89%87">セキュリティの鉄則</h3>
<ul>
<li><strong>APIキーは他人に教えない</strong>（クレジットカードと同等）</li>
<li>大手顧客の機密データは<strong>原文のまま入れない</strong></li>
<li><strong>完全にゼロリスクではない</strong>と理解する</li>
</ul>

</section>

<header>SSOL AI駆動開発研修 第1回</header>
<h2 id="%E3%82%BB%E3%82%AD%E3%83%A5%E3%83%AA%E3%83%86%E3%82%A3%E3%81%AE%E3%83%99%E3%82%B9%E3%83%88%E3%83%97%E3%83%A9%E3%82%AF%E3%83%86%E3%82%A3%E3%82%B9">セキュリティのベストプラクティス</h2>

<h3 id="%E6%A4%9C%E8%A8%BC%E7%92%B0%E5%A2%83">検証環境</h3>
<ul>
<li>ローカル端末にAPIキーを置いたまま検証しない</li>
<li>Secretは <strong>GCP Secret Manager / AWS Secrets Manager / Vercel Env</strong> に保存</li>
<li>実行環境は <strong>Cloud Run などのクラウド側</strong> に寄せる</li>
</ul>
<h3 id="ai%E3%81%AB%E6%B8%A1%E3%81%99%E6%A8%A9%E9%99%90">AIに渡す権限</h3>
<ul>
<li><strong>Vercel / GCP にフルアクセスできるコマンドは渡さない</strong></li>
<li>初回だけ人手で環境変数を登録し、以後はAIから参照できない設計にする</li>
<li>IAMロールやCLI権限を絞り、<strong>環境変数の読取権限を持たせない</strong></li>
</ul>
<blockquote>
<p>現状もっとも現実的なのは「シークレットはクラウド保管」「AIには最小権限のみ付与」の運用</p>
</blockquote>

<p>特定イベントに連動して<strong>自動実行</strong>される処理</p>

<th>トリガー</th>
<th>アクション例</th>
</tr>
</thead>
<tbody>

</tr>
<tr>
<td>コマンド実行前</td>
<td>カスタム検証・安全確認</td>
</tr>
<tr>
<td>コミット前</td>
<td>テスト実行・リント</td>
</tr>
</tbody>
</table>
<p><strong>例: 保存時に自動フォーマット</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;hooks&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>

      <span class="hljs-attr">&quot;matcher&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Write|Edit&quot;</span><span class="hljs-punctuation">,</span>

    <span class="hljs-punctuation">}</span><span class="hljs-punctuation">]</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>

<h2 id="%E5%90%88%E6%A0%BC%E3%83%BB%E4%B8%8D%E5%90%88%E6%A0%BC%E3%82%92%E5%90%8C%E6%99%82%E3%81%AB%E5%AE%9A%E7%BE%A9%E3%81%99%E3%82%8B">合格・不合格を同時に定義する</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>【合格条件（正常系）】
- ログインすると前回の会話履歴が表示される

【不合格条件（異常系）】
- 未認証ユーザーがチャット画面にアクセスできてはいけない
- 他人のチャット履歴が見えてはいけない
- FAQ0件の状態でエラーにならない（「該当なし」を返す）
</code></pre>
<blockquote>
<p><strong>合格条件だけでなく「やってはいけないこと」も定義</strong>すると、テストの精度が上がる</p>
